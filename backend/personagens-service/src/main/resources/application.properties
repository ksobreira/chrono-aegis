server.port=8083
spring.application.name=personagens-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# CORRIGIDO: era mem (volátil), agora persiste em arquivo
spring.datasource.url=jdbc:h2:file:./data/personagensdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# CORRIGIDO: era create-drop (apagava tudo ao reiniciar), agora update
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.chronoaegis=DEBUG
